services:
  mysql:
    image: mysql:8.0
    container_name: consistency_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: consistency_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: consistency_redis
    ports:
      - "6379:6379"

volumes:
  mysql_data:
